name: CI

on:
  # Only run push on main
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  # Always run on PRs
  pull_request:

concurrency:
  group: 'ci-${{ github.event.merge_group.head_ref || github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Check formatting
        run: ./gradlew spotlessCheck

  core:
    name: "core artifacts"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Check root project
        run: |
          echo "Running checks..."
          ./gradlew check --continue --quiet ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: (Fail-only) Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports-core
          path: |
            **/build/reports/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: 'Test Report - core'

  samples:
    name: samples
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Check samples
        run: |
          ./gradlew check --continue --quiet ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: (Fail-only) Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports-samples
          path: |
            **/build/reports/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: 'Test Report - samples'

  # Run multiplatform tests on main only to reduce PR time
  # Note: We use step-level conditions instead of job-level to ensure matrix expands and shows nice names
  multiplatform-tests:
    name: ${{ format('multiplatform / {0}{1}', matrix.os, github.ref != 'refs/heads/main' && ' (skipped)' || '') }}
    runs-on: ${{ github.ref == 'refs/heads/main' && matrix.os || 'ubuntu-latest' }}
    permissions:
      checks: write

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Skip on PRs
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping multiplatform tests on PRs to reduce CI time"

      - name: Checkout
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Check runtime and IC tests
        if: github.ref == 'refs/heads/main'
        run: ./gradlew check --continue --quiet

      - name: (Fail-only) Upload reports
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: reports-multiplatform-${{ matrix.os }}
          path: |
            **/build/reports/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure() && github.ref == 'refs/heads/main'
        with:
          report_paths: |
            **/build/test-results/**/TEST-*.xml
          check_name: 'Test Report - multiplatform / ${{ matrix.os }}'

  # https://jakewharton.com/fan-in-to-a-single-required-github-action/
  final-status:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - format
      - core
      - samples
    steps:
      - name: Check
        run: |
          results=$(tr -d '\n' <<< '${{ toJSON(needs.*.result) }}')
          if ! grep -q -v -E '(failure|cancelled)' <<< "$results"; then
            echo "One or more required jobs failed"
            exit 1
          fi
